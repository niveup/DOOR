name: Apply priority fixes

on:
  push:
    branches: [master]
    paths:
      - scripts/apply-priority-fixes.py
      - .github/workflows/apply-priority-fixes.yml

permissions:
  contents: write

jobs:
  patch-build-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Check out target and apply minimal patches
        run: |
          cp scripts/apply-priority-fixes.py /tmp/apply-priority-fixes.py
          git fetch origin feat/editorial-study-workspace-ui
          git checkout feat/editorial-study-workspace-ui
          python3 /tmp/apply-priority-fixes.py
      - name: Build backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DIRECT_URL: postgresql://user:pass@localhost:5432/db
          SESSION_SECRET: ci-only-session-secret-at-least-32-characters
          APP_PASSCODE: ci-only-passcode
        run: |
          npm ci
          npm run prisma:generate
          npm run build
      - name: Build frontend
        working-directory: frontend
        env:
          SESSION_SECRET: ci-only-session-secret-at-least-32-characters
          APP_PASSCODE: ci-only-passcode
          NEXT_PUBLIC_API_URL: http://localhost:4000
        run: |
          npm ci
          npm run build
      - name: Push verified target changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/server.ts frontend/app/interview/page.tsx frontend/app/journal/page.tsx frontend/app/tracker/page.tsx frontend/components/AppShell.tsx frontend/app/globals.css
          git commit -m "fix: AI interview evaluation, markdown consistency, empty states, mobile tabs"
          git push origin HEAD:feat/editorial-study-workspace-ui
      - name: Remove one-shot runner from master
        if: always()
        run: |
          git checkout master
          git pull --ff-only origin master
          git rm -f .github/workflows/apply-priority-fixes.yml scripts/apply-priority-fixes.py
          git commit -m "chore(ci): remove completed one-shot patch runner" || true
          git push origin HEAD:master
