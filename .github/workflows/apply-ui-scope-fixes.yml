name: Apply UI scope fixes
on:
  push:
    branches: [fix/audit-report-2026-07-11]
    paths: [.github/workflows/apply-ui-scope-fixes.yml]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: fix/audit-report-2026-07-11, fetch-depth: 0 }
      - run: python3 scripts/apply_ui_scope_fixes.py
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund && npx tsc --noEmit
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-ui-scope-fixes.yml scripts/apply_ui_scope_fixes.py
          git add frontend
          git commit -m "fix(ui): mechanical-only explainer and responsive phone shell"
          git push
