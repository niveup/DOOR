name: Verify desktop regression fix
on:
  push:
    branches: [fix/desktop-ui-regression-isolate-mobile]
permissions:
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund && npx tsc --noEmit
      - name: Verify CSS isolation and desktop baseline
        run: python3 scripts/verify_desktop_isolation.py
      - name: Commit generated verification record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DESKTOP_REGRESSION_VERIFICATION.md
          git commit -m "test(ui): verify desktop baseline and mobile isolation"
          git push
