name: Apply renderer lint fixes
on:
  push:
    branches: [deploy/vercel-production-ready]
    paths:
      - .github/workflows/apply-renderer-lint-fixes.yml
      - scripts/apply_renderer_lint_fixes.py
permissions:
  contents: write
concurrency:
  group: renderer-lint-fixes
  cancel-in-progress: true
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: deploy/vercel-production-ready, fetch-depth: 0 }
      - run: python3 scripts/apply_renderer_lint_fixes.py
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - working-directory: frontend
        run: npm install --legacy-peer-deps --include=dev --no-audit --no-fund
      - working-directory: frontend
        run: npx --no-install tsc --noEmit && npm run lint
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-renderer-lint-fixes.yml scripts/apply_renderer_lint_fixes.py
          git add frontend/components/AiMarkdown.tsx
          git commit -m "fix(ui): keep AI renderer hooks unconditional"
          git push
