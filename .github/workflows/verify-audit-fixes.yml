name: Verify audit fixes
on:
  push:
    branches: [fix/audit-report-2026-07-11]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: backend
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - working-directory: backend
        run: npm run prisma:generate
      - working-directory: backend
        run: npx tsc --noEmit
      - working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - working-directory: frontend
        run: npx tsc --noEmit
      - name: Security assertions
        run: |
          if grep -RIn --exclude-dir=node_modules --exclude-dir=.next '"1234"' frontend backend; then exit 1; fi
          test "$(grep -RIn --include='*.ts' --include='*.tsx' 'console\.log' backend/src | wc -l)" -eq 0
