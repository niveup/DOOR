name: Apply Explainer polish

on:
  push:
    branches: [feat/explainer-guided-output-polish]
    paths: [.github/workflows/apply-explainer-polish.yml]

permissions:
  contents: write

concurrency:
  group: explainer-polish
  cancel-in-progress: true

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/explainer-guided-output-polish
          fetch-depth: 0
      - run: python3 scripts/apply_explainer_polish.py
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: frontend
        run: npm install --legacy-peer-deps --include=dev --no-audit --no-fund
      - working-directory: frontend
        run: npx --no-install tsc --noEmit
      - working-directory: frontend
        run: npm run build
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-explainer-polish.yml scripts/apply_explainer_polish.py
          git add frontend/app/explainer/page.tsx frontend/app/globals.css
          git commit -m "feat(explainer): polish guided output hierarchy and interactions"
          git push
