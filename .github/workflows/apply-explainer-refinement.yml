name: Apply Explainer refinement
on:
  push:
    branches: [feat/explainer-guided-output]
    paths:
      - .github/workflows/apply-explainer-refinement.yml
      - scripts/apply_explainer_refinement.py
permissions:
  contents: write
concurrency:
  group: explainer-refinement
  cancel-in-progress: true
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: feat/explainer-guided-output, fetch-depth: 0 }
      - run: python3 scripts/apply_explainer_refinement.py
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - working-directory: frontend
        run: npm install --legacy-peer-deps --include=dev --no-audit --no-fund
      - name: TypeScript
        working-directory: frontend
        run: npx --no-install tsc --noEmit
      - name: Build
        working-directory: frontend
        env:
          NODE_ENV: production
          SESSION_SECRET: ci-session-secret-32-characters-minimum-value
          APP_PASSCODE: ci-passcode-not-for-production
          NEXT_PUBLIC_API_URL: /api/backend
          BACKEND_API_URL: https://example.com
        run: |
          set +e
          npm run build 2>&1 | tee /tmp/explainer-build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            tail -120 /tmp/explainer-build.log
          fi
          exit "$code"
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-explainer-refinement.yml scripts/apply_explainer_refinement.py
          git add frontend/app/explainer/page.tsx frontend/components/AiMarkdown.tsx frontend/app/globals.css
          git commit -m "feat(explainer): add guided hierarchy and tactile interactions"
          git push
