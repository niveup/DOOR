name: Apply tablet baseline navigation
on:
  push:
    branches: [fix/desktop-ui-regression-isolate-mobile]
    paths: [.github/workflows/apply-tablet-baseline.yml]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: fix/desktop-ui-regression-isolate-mobile, fetch-depth: 0 }
      - run: python3 scripts/apply_tablet_baseline.py
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund && npx tsc --noEmit
      - run: python3 scripts/verify_desktop_isolation.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-tablet-baseline.yml scripts/apply_tablet_baseline.py
          git add frontend DESKTOP_REGRESSION_VERIFICATION.md
          git commit -m "fix(ui): isolate phone tabs and restore desktop baseline"
          git push
