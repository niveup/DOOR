name: Apply interview AI endpoint patch

on:
  push:
    branches: [fix/interview-ai-and-consistency]
    paths: [.github/workflows/apply-interview-endpoint.yml]

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/interview-ai-and-consistency
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Apply minimal server patch
        run: python3 scripts/apply_interview_endpoint.py
      - name: Install and generate Prisma client
        working-directory: backend
        run: |
          npm ci
          npm run prisma:generate
      - name: Verify backend TypeScript
        working-directory: backend
        run: npm run build
      - name: Commit verified endpoint
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/server.ts
          git commit -m "feat(interview): evaluate answers with the real AI backend"
          git push
