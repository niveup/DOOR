name: Apply Markdown consistency patch

on:
  push:
    branches: [fix/interview-ai-and-consistency]
    paths:
      - .github/workflows/apply-markdown-consistency.yml
      - scripts/apply_markdown_consistency.py

permissions:
  contents: write

concurrency:
  group: markdown-consistency-patch
  cancel-in-progress: true

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/interview-ai-and-consistency
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python3 scripts/apply_markdown_consistency.py
      - working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Build frontend
        working-directory: frontend
        run: |
          set +e
          npm run build 2>&1 | tee /tmp/frontend-build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            message=$(tail -80 /tmp/frontend-build.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            echo "::error::$message"
          fi
          exit "$code"
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -- frontend/package-lock.json
          git add frontend/app/journal/page.tsx frontend/app/tracker/page.tsx frontend/app/interview/page.tsx
          git commit -m "feat(ui): render AI feedback consistently with AiMarkdown"
          git push
