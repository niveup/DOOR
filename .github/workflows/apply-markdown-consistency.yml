name: Apply Markdown consistency patch

on:
  push:
    branches: [fix/interview-ai-and-consistency]
    paths:
      - .github/workflows/apply-markdown-consistency.yml
      - scripts/apply_markdown_consistency.py

permissions:
  contents: write

concurrency:
  group: markdown-consistency-patch
  cancel-in-progress: true

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/interview-ai-and-consistency
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python3 scripts/apply_markdown_consistency.py
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run build
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/app/journal/page.tsx frontend/app/tracker/page.tsx frontend/app/interview/page.tsx
          git commit -m "feat(ui): render AI feedback consistently with AiMarkdown"
          git push
