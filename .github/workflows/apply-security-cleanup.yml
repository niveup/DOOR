name: Apply security cleanup
on:
  push:
    branches: [fix/audit-report-2026-07-11]
    paths: [.github/workflows/apply-security-cleanup.yml]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/audit-report-2026-07-11
          fetch-depth: 0
      - run: python3 scripts/apply_security_cleanup.py
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - working-directory: backend
        run: npm install --legacy-peer-deps --no-audit --no-fund && npm run prisma:generate && npx tsc --noEmit
      - working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund && npx tsc --noEmit
      - run: |
          ! grep -RIn --exclude-dir=node_modules --exclude-dir=.next '"1234"' frontend backend
          ! grep -RIn --include='*.ts' --include='*.tsx' 'console\.log' backend/src
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-security-cleanup.yml scripts/apply_security_cleanup.py
          git add frontend backend
          git commit -m "fix(security): remove public passcodes and fail closed"
          git push
