name: Refine exhaustive audit
on:
  push:
    branches: [audit/exhaustive-codebase-2026-07-11]
    paths: [.github/workflows/refine-audit.yml]
permissions:
  contents: write
jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/exhaustive-codebase-2026-07-11
          fetch-depth: 0
      - run: python3 scripts/refine_audit.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/refine-audit.yml scripts/refine_audit.py
          git add AUDIT_REPORT.md
          git commit -m "docs: refine exhaustive audit after gateway and schema cross-check"
          git push
